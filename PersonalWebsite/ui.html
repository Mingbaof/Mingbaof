<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mingbo Feng | Interactive Beach</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #00b4ff;
            --sky-bottom: #c8f790;
            --ocean-deep: #0a6dbf;
            --ocean-mid: #1a85d8;
            --ocean-shallow: #4cc9f0;
            --sand: #f5e8b0;
            --sand-dark: #e0cc84;
            --text-dark: #1a365d;
            --ui-bg: rgba(255, 255, 255, 0.93);
            --foam: rgba(255, 255, 255, 0.92);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'VT323', monospace;
            overflow: hidden;
            color: var(--text-dark);
            background: #00b4ff;
        }

        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* ========================
           SKY
        ======================== */
        .sky {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(to bottom, #00b4ff 0%, #4dcfff 60%, #c8f790 100%);
        }

        .cloud {
            position: absolute;
            image-rendering: pixelated;
        }
        .cloud svg { display: block; }

        /* ========================
           OCEAN — layered
        ======================== */
        .ocean {
            position: absolute;
            top: 38%;
            left: 0; right: 0;
            height: 24%;
            overflow: hidden;
        }

        .ocean-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, #0a6dbf 0%, #1a85d8 50%, #3ab4ee 100%);
        }

        .ocean-sparkles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 50%;
            overflow: hidden;
        }

        .ocean-stripes {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 6px,
                rgba(255,255,255,0.04) 6px,
                rgba(255,255,255,0.04) 8px
            );
        }

        /* ========================
           BEACH / SAND
        ======================== */
        .beach {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 42%;
            background: var(--sand);
        }

        .beach::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle, #d8bb72 1px, transparent 1px),
                radial-gradient(circle, #e0cc84 1px, transparent 1px);
            background-size: 18px 18px, 11px 11px;
            background-position: 0 0, 9px 9px;
            opacity: 0.45;
        }

        .wet-sand {
            position: absolute;
            top: 0px; /* Changed from -8px to remove the sand gap */
            left: 0; right: 0;
            height: 36px; /* Increased slightly to maintain visual thickness */
            background: linear-gradient(to bottom, #c8a850 0%, var(--sand) 100%);
            opacity: 0.5;
        }

        /* ========================
           TIDE CLIPPER (THE FIX)
        ======================== */
        /* This container strictly cuts off any water trying to reach above the 58% ocean seam */
        .tide-clip {
            position: absolute;
            top: 58%; 
            left: 0;
            width: 100vw;
            bottom: 0; /* Extends to bottom of screen */
            overflow: hidden; /* Clips the flooding water */
            z-index: 15;
            pointer-events: none; /* Allows you to click the shells underneath */
        }

        /* ========================
           TIDE — multi-layer wave system
        ======================== */
        .tide-system {
            position: absolute;
            left: 0;
            top: 0; /* Anchored to the top of the tide-clip */
            width: 100vw;
            height: 70vh;
            animation: tideFlow 7s ease-in-out infinite alternate;
        }

        @keyframes tideFlow {
            0%   { transform: translateY(0%); }
            30%  { transform: translateY(0%); }
            70%  { transform: translateY(42%); }
            100% { transform: translateY(42%); }
        }

        .tide-body {
            position: absolute;
            top: -200vh; left: 0; right: 0;
            height: calc(200vh + 60px); /* Extends the blue water behind the waves */
            background: linear-gradient(to bottom,
                rgba(10, 90, 160, 0.97) 0%,
                rgba(26, 113, 190, 0.94) 80%,
                rgba(42, 149, 220, 0.90) 100%
            );
            z-index: -1; /* Pushes the solid water block behind the SVG crests */
        }

        .wave-row-1 {
            position: absolute;
            top: 0px; left: 0;
            width: 200%;
            height: 36px;
            animation: waveSlide1 8s linear infinite; /* Increased from 5s */
        }

        .wave-row-2 {
            position: absolute;
            top: 16px; left: 0;
            width: 200%;
            height: 52px;
            animation: waveSlide2 6s linear infinite; /* Increased from 3.5s */
        }

        .wave-foam {
            position: absolute;
            top: 52px; left: 0;
            width: 200%;
            height: 20px;
            animation: waveSlide2 6s linear infinite; /* Matches .wave-row-2's new value */
            opacity: 0.75;
        }

        @keyframes waveSlide1 {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes waveSlide2 {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ========================
           SUN MENU
        ======================== */
        .sun-nav {
            position: absolute;
            top: 28px;
            left: 52px;
            z-index: 100;
        }

        .sun {
            width: 72px;
            height: 72px;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .sun:hover { transform: scale(1.08) rotate(12deg); }

        .sun-core {
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            background: #fff9c4;
            box-shadow:
                0 0 0 4px #ffe566,
                0 0 20px 8px rgba(255,229,100,0.6),
                0 0 50px 20px rgba(255,220,50,0.3);
            animation: sunPulse 3s ease-in-out infinite;
        }

        @keyframes sunPulse {
            0%, 100% { box-shadow: 0 0 0 4px #ffe566, 0 0 20px 8px rgba(255,229,100,0.5), 0 0 50px 20px rgba(255,220,50,0.25); }
            50%       { box-shadow: 0 0 0 6px #ffda00, 0 0 28px 12px rgba(255,229,100,0.7), 0 0 70px 28px rgba(255,220,50,0.4); }
        }

        .sun-menu {
            display: none;
            position: absolute;
            top: 82px;
            left: 0;
            background: var(--ui-bg);
            border: 3px solid var(--text-dark);
            padding: 0;
            list-style: none;
            margin: 0;
            width: 164px;
            box-shadow: 5px 5px 0px var(--text-dark);
        }

        .sun-nav:hover .sun-menu { display: block; }

        .sun-menu li {
            padding: 11px 16px;
            font-size: 1.35rem;
            cursor: pointer;
            border-bottom: 2px dashed #bbb;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sun-menu li:last-child { border-bottom: none; }
        .sun-menu li:hover { background: var(--text-dark); color: #fff; }
        .sun-menu li span { font-size: 1rem; }

        /* ========================
           HERO CARD
        ======================== */
        .hero {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: var(--ui-bg);
            border: 3px solid var(--text-dark);
            padding: 18px 28px;
            box-shadow: 6px 6px 0px var(--text-dark);
            z-index: 10;
            width: 92%;
            max-width: 660px;
        }

        .hero h1 { margin: 0; font-size: 3.6rem; letter-spacing: 1px; }
        .hero .chinese-name { margin: 0; font-size: 1.1rem; color: #777; font-family: 'VT323', monospace; letter-spacing: 2px; }
        .hero p { font-size: 1.5rem; line-height: 1.25; margin: 6px 0 0; }

        /* ========================
           SHELLS
        ======================== */
        .shells-container {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 90px;
            z-index: 5;
        }

        .shell-wrapper {
            text-align: center;
            cursor: pointer;
            transition: transform 0.18s;
            position: relative;
        }

        .shell-wrapper:hover { transform: translateY(-10px) scale(1.05); }
        .shell-wrapper:hover .shell-label { background: var(--text-dark); color: #fff; }

        .shell-sprite {
            display: block;
            width: 56px;
            height: 56px;
            margin: 0 auto 10px;
            image-rendering: pixelated;
        }

        .shell-label {
            background: var(--ui-bg);
            border: 2px solid var(--text-dark);
            padding: 3px 12px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            position: relative;
            z-index: 20;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .shell-wrapper.digging .shell-sprite {
            animation: digBounce 0.4s ease-in-out 3;
        }

        @keyframes digBounce {
            0%   { transform: translateY(0) rotate(0deg); }
            30%  { transform: translateY(-6px) rotate(-8deg); }
            60%  { transform: translateY(4px) rotate(4deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .shell-shadow {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0,0,0,0.12);
            z-index: 3;
        }

        /* ========================
           PIXEL BIRDS
        ======================== */
        .birds {
            position: absolute;
            top: 12%;
            left: 30%;
            z-index: 8;
            animation: birdFly 18s linear infinite;
        }

        @keyframes birdFly {
            0%   { transform: translateX(0) translateY(0); }
            50%  { transform: translateX(120px) translateY(-20px); }
            100% { transform: translateX(0) translateY(0); }
        }

        /* ========================
           LOCATION BADGE
        ======================== */
        .location-badge {
            position: absolute;
            bottom: 6%;
            right: 4%;
            background: var(--ui-bg);
            border: 2px solid var(--text-dark);
            padding: 4px 12px;
            font-size: 1.1rem;
            color: #555;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.15);
            z-index: 100;
        }

        /* ========================
           SCROLL HINT
        ======================== */
        .scroll-hint {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            color: rgba(26,54,93,0.55);
            z-index: 100;
            animation: fadeHint 2.5s ease-in-out infinite;
        }

        @keyframes fadeHint {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 1; }
        }

        /* ========================
           PIXEL STARFISH on sand
        ======================== */
        .starfish {
            position: absolute;
            z-index: 6;
            image-rendering: pixelated;
        }

    </style>
</head>
