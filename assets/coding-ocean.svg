<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="60%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#E0F7FA"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077B6"/>
      <stop offset="50%" style="stop-color:#0096C7"/>
      <stop offset="100%" style="stop-color:#00B4D8"/>
    </linearGradient>
    <linearGradient id="desk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C4033"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
  </defs>

  <!-- Room background -->
  <rect width="400" height="300" fill="#F5F0E8"/>

  <!-- Window frame -->
  <rect x="180" y="20" width="200" height="150" rx="3" fill="#8B7355" stroke="#6B5340" stroke-width="3"/>
  <rect x="185" y="25" width="190" height="140" rx="2" fill="url(#sky)"/>

  <!-- Ocean through window -->
  <rect x="185" y="105" width="190" height="60" fill="url(#ocean)"/>

  <!-- Animated waves -->
  <g>
    <path d="M185,115 Q210,108 235,115 Q260,122 285,115 Q310,108 335,115 Q360,122 375,115" 
          fill="none" stroke="#48CAE4" stroke-width="2" opacity="0.7">
      <animate attributeName="d" 
               values="M185,115 Q210,108 235,115 Q260,122 285,115 Q310,108 335,115 Q360,122 375,115;
                       M185,115 Q210,122 235,115 Q260,108 285,115 Q310,122 335,115 Q360,108 375,115;
                       M185,115 Q210,108 235,115 Q260,122 285,115 Q310,108 335,115 Q360,122 375,115"
               dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M185,125 Q215,118 245,125 Q275,132 305,125 Q335,118 375,125" 
          fill="none" stroke="#90E0EF" stroke-width="1.5" opacity="0.6">
      <animate attributeName="d" 
               values="M185,125 Q215,118 245,125 Q275,132 305,125 Q335,118 375,125;
                       M185,125 Q215,132 245,125 Q275,118 305,125 Q335,132 375,125;
                       M185,125 Q215,118 245,125 Q275,132 305,125 Q335,118 375,125"
               dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M185,135 Q220,128 255,135 Q290,142 325,135 Q360,128 375,135" 
          fill="none" stroke="#CAF0F8" stroke-width="1" opacity="0.5">
      <animate attributeName="d" 
               values="M185,135 Q220,128 255,135 Q290,142 325,135 Q360,128 375,135;
                       M185,135 Q220,142 255,135 Q290,128 325,135 Q360,142 375,135;
                       M185,135 Q220,128 255,135 Q290,142 325,135 Q360,128 375,135"
               dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Sun through window -->
  <circle cx="340" cy="55" r="20" fill="#FFD700" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.7;0.9" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="55" r="25" fill="#FFD700" opacity="0.2">
    <animate attributeName="r" values="25;28;25" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Clouds -->
  <g opacity="0.8">
    <ellipse cx="220" cy="45" rx="15" ry="8" fill="white"/>
    <ellipse cx="235" cy="43" rx="12" ry="7" fill="white"/>
    <ellipse cx="227" cy="40" rx="10" ry="6" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;10,0;0,0" dur="20s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.6">
    <ellipse cx="290" cy="60" rx="12" ry="6" fill="white"/>
    <ellipse cx="300" cy="58" rx="10" ry="5" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,0;0,0" dur="15s" repeatCount="indefinite"/>
  </g>

  <!-- Beach/sand through window -->
  <path d="M185,145 Q230,140 280,143 Q330,146 375,142 L375,165 L185,165 Z" fill="#F4D35E" opacity="0.7"/>

  <!-- Window divider -->
  <line x1="280" y1="25" x2="280" y2="165" stroke="#8B7355" stroke-width="3"/>
  <line x1="185" y1="95" x2="375" y2="95" stroke="#8B7355" stroke-width="3"/>

  <!-- Desk -->
  <rect x="20" y="200" width="360" height="15" rx="3" fill="url(#desk)"/>
  <rect x="30" y="215" width="8" height="85" fill="#5C4033"/>
  <rect x="362" y="215" width="8" height="85" fill="#5C4033"/>

  <!-- Monitor -->
  <rect x="60" y="120" width="110" height="75" rx="5" fill="#2d2d2d"/>
  <rect x="65" y="125" width="100" height="65" rx="3" fill="url(#screen)"/>
  <rect x="105" y="195" width="20" height="8" fill="#2d2d2d"/>
  <rect x="95" y="200" width="40" height="4" rx="2" fill="#3d3d3d"/>

  <!-- Code on screen -->
  <g>
    <rect x="70" y="132" width="35" height="3" rx="1" fill="#48CAE4" opacity="0.9"/>
    <rect x="70" y="139" width="50" height="3" rx="1" fill="#90E0EF" opacity="0.8"/>
    <rect x="75" y="146" width="40" height="3" rx="1" fill="#0077B6" opacity="0.7"/>
    <rect x="75" y="153" width="55" height="3" rx="1" fill="#48CAE4" opacity="0.9"/>
    <rect x="70" y="160" width="30" height="3" rx="1" fill="#CAF0F8" opacity="0.8"/>
    <rect x="70" y="167" width="45" height="3" rx="1" fill="#00B4D8" opacity="0.7"/>
    <rect x="75" y="174" width="38" height="3" rx="1" fill="#90E0EF" opacity="0.8"/>
    <!-- Cursor blink -->
    <rect x="113" y="174" width="2" height="4" fill="#48CAE4">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Person (side view - Asian male, medium hair, 3:7 part) -->
  <!-- Chair -->
  <rect x="135" y="220" width="50" height="5" rx="2" fill="#4a4a4a"/>
  <rect x="155" y="225" width="10" height="50" fill="#4a4a4a"/>
  <ellipse cx="160" cy="278" rx="20" ry="5" fill="#3d3d3d"/>

  <!-- Body -->
  <path d="M145,195 Q155,180 165,195 L170,220 L140,220 Z" fill="#1B4965"/>

  <!-- Arms -->
  <path d="M145,195 Q130,200 120,198" fill="none" stroke="#F5CBA7" stroke-width="5" stroke-linecap="round"/>
  <path d="M165,195 Q175,200 178,198" fill="none" stroke="#F5CBA7" stroke-width="5" stroke-linecap="round"/>

  <!-- Hands on keyboard area -->
  <ellipse cx="118" cy="198" rx="4" ry="3" fill="#F5CBA7"/>
  <ellipse cx="180" cy="198" rx="4" ry="3" fill="#F5CBA7"/>

  <!-- Keyboard -->
  <rect x="110" y="200" width="80" height="4" rx="2" fill="#4a4a4a"/>

  <!-- Head -->
  <ellipse cx="155" cy="168" rx="14" ry="16" fill="#F5CBA7"/>

  <!-- Hair (3:7 part - more hair on right side) -->
  <path d="M141,162 Q142,148 155,145 Q168,148 169,162" fill="url(#hair)"/>
  <!-- 3:7 parting - left side (30%) shorter -->
  <path d="M141,162 Q141,155 148,152" fill="url(#hair)"/>
  <!-- Right side (70%) more volume -->
  <path d="M148,152 Q155,148 165,150 Q170,155 169,165" fill="url(#hair)"/>
  <!-- Hair strands for medium length -->
  <path d="M140,162 Q138,168 139,172" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M169,162 Q172,168 171,174" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Ear -->
  <ellipse cx="140" cy="170" rx="3" ry="4" fill="#F0BC8A"/>

  <!-- Glasses (optional - CS dev vibe) -->
  <circle cx="150" cy="170" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="163" cy="170" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="156" y1="170" x2="157" y2="170" stroke="#333" stroke-width="1.5"/>
  <line x1="144" y1="170" x2="141" y2="168" stroke="#333" stroke-width="1"/>

  <!-- Coffee mug -->
  <rect x="35" y="188" width="15" height="14" rx="3" fill="#E8E8E8"/>
  <path d="M50,192 Q56,192 56,195 Q56,198 50,198" fill="none" stroke="#E8E8E8" stroke-width="2"/>
  <!-- Steam -->
  <path d="M40,185 Q42,180 40,175" fill="none" stroke="#ddd" stroke-width="1" opacity="0.6">
    <animate attributeName="d" values="M40,185 Q42,180 40,175;M40,185 Q38,180 40,175;M40,185 Q42,180 40,175" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M45,186 Q47,181 45,176" fill="none" stroke="#ddd" stroke-width="1" opacity="0.4">
    <animate attributeName="d" values="M45,186 Q47,181 45,176;M45,186 Q43,181 45,176;M45,186 Q47,181 45,176" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Small plant on desk -->
  <rect x="340" y="190" width="12" height="12" rx="2" fill="#00B4D8"/>
  <path d="M346,190 Q344,182 340,178" fill="none" stroke="#2D6A4F" stroke-width="2"/>
  <path d="M346,190 Q348,183 352,180" fill="none" stroke="#2D6A4F" stroke-width="2"/>
  <path d="M346,188 Q346,182 346,176" fill="none" stroke="#40916C" stroke-width="2"/>
  <circle cx="340" cy="176" r="3" fill="#52B788"/>
  <circle cx="352" cy="178" r="3" fill="#52B788"/>
  <circle cx="346" cy="174" r="3" fill="#40916C"/>
</svg>